services:
  gpt-tools-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpt-tools-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
      - gpt_tools_node_modules:/app/node_modules
      - gpt_tools_next:/app/.next
    command: sh -c "npm install && npm run build && npm run start -- --hostname 0.0.0.0"
    restart: unless-stopped

volumes:
  gpt_tools_node_modules:
  gpt_tools_next:
